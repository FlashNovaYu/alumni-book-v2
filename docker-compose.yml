services:
  api:
    build:
      context: .
      dockerfile: workers/api/Dockerfile
    env_file:
      - deploy/.env
    environment:
      DATABASE_PATH: /var/lib/alumni-book/data/alumni.sqlite
      UPLOAD_ROOT: /var/lib/alumni-book/uploads
      PORT: 8787
      RELEASE_SHA: ${RELEASE_SHA:?RELEASE_SHA must be a full 40-character commit SHA}
    volumes:
      - /var/lib/alumni-book/data:/var/lib/alumni-book/data
      - /var/lib/alumni-book/uploads:/var/lib/alumni-book/uploads
    expose:
      - "8787"
    ports:
      - "127.0.0.1:8787:8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "workers/api/healthcheck.mjs"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    profiles: ["container-nginx"]
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./deploy/selfhosted:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    restart: unless-stopped
