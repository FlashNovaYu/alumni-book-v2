services:
  api:
    build:
      context: .
      dockerfile: workers/api/Dockerfile
    env_file:
      - deploy/.env
    environment:
      DATABASE_PATH: /var/lib/alumni-book/data/alumni.sqlite
      UPLOAD_ROOT: /var/lib/alumni-book/uploads
      PORT: 8787
    volumes:
      - /var/lib/alumni-book/data:/var/lib/alumni-book/data
      - /var/lib/alumni-book/uploads:/var/lib/alumni-book/uploads
    expose:
      - "8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./deploy/selfhosted:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    restart: unless-stopped
