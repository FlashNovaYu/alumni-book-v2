# Render only the four ALUMNI_BOOK_* placeholders so Nginx variables such as $host remain intact:
# envsubst '${ALUMNI_BOOK_SERVER_NAME} ${ALUMNI_BOOK_TLS_CERTIFICATE} ${ALUMNI_BOOK_TLS_CERTIFICATE_KEY} ${ALUMNI_BOOK_API_UPSTREAM}'
server {
  listen 80;
  server_name ${ALUMNI_BOOK_SERVER_NAME};
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl;
  http2 on;
  server_name ${ALUMNI_BOOK_SERVER_NAME};
  root /www/wwwroot/alumni-book;
  index index.html;

  ssl_certificate ${ALUMNI_BOOK_TLS_CERTIFICATE};
  ssl_certificate_key ${ALUMNI_BOOK_TLS_CERTIFICATE_KEY};
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 20m;

  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
  add_header Content-Security-Policy "base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'" always;

  location = /api {
    proxy_pass ${ALUMNI_BOOK_API_UPSTREAM}/api;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass ${ALUMNI_BOOK_API_UPSTREAM};
    proxy_http_version 1.1;
    proxy_request_buffering off;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /robots.txt {
    default_type text/plain;
    try_files $uri =404;
  }

  location ~* ^/(?:assets|admin/assets)/ {
    try_files $uri =404;
  }

  location /admin/ {
    try_files $uri $uri/ /admin/index.html;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
