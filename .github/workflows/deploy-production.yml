name: Deploy Production Pages

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '输入 DEPLOY_PRODUCTION 确认发布生产环境'
        required: true
        type: string
      d1_migrations_preapplied:
        description: '仅在已使用受信任运维凭据应用并核验全部 D1 迁移时启用'
        required: true
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_API_BASE_URL: ''
      VITE_SSG_API_BASE: 'https://alumni-book.pages.dev'
      SITE_BASE: /
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Verify production deployment context
        env:
          DEPLOY_CONFIRMATION: ${{ inputs.confirmation }}
        run: node scripts/production-deploy-guard.mjs
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter site-astro exec playwright install --with-deps chromium
      - name: Create test-only Worker variables
        run: |
          node -e "const { randomBytes } = require('node:crypto'); require('node:fs').writeFileSync('workers/api/.dev.vars', 'JWT_' + 'SECRET=' + randomBytes(32).toString('hex') + '\n')"
          echo "CORS_ORIGIN=http://localhost:4321" >> workers/api/.dev.vars
      - run: pnpm verify:all
      - name: Record pre-applied D1 migration acknowledgement
        if: ${{ inputs.d1_migrations_preapplied }}
        run: echo "D1 migrations were pre-applied and verified before this protected deployment."
      - name: Apply remote D1 migrations
        if: ${{ !inputs.d1_migrations_preapplied }}
        working-directory: workers/api
        run: npx wrangler d1 migrations apply alumni-book-db --remote --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Prepare unified Pages deployment
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: pnpm prepare:pages
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          pnpm --filter worker exec wrangler --cwd ../.. pages deploy deploy
          --project-name alumni-book --branch main
          --commit-hash "$GITHUB_SHA" --commit-dirty=false
      - name: Smoke test exact production release
        env:
          PAGES_BASE_URL: https://alumni-book.pages.dev
          PAGES_EXPECTED_SHA: ${{ github.sha }}
        run: pnpm smoke:pages
