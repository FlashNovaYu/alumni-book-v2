name: Deploy Production Pages

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: '输入 DEPLOY_PRODUCTION 确认发布生产环境'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: pages-production
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    environment: production
    env:
      VITE_API_BASE_URL: ''
      VITE_WORKER_URL: 'https://alumni-book.pages.dev'
      SITE_BASE: /
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Verify production deployment context
        env:
          DEPLOY_CONFIRMATION: ${{ inputs.confirmation }}
        run: node scripts/production-deploy-guard.mjs
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter site-astro exec playwright install --with-deps chromium
      - name: Create test-only Worker variables
        run: |
          echo "JWT_SECRET=alumni-book-jwt-secret-dev-only-2026" > workers/api/.dev.vars
          echo "CORS_ORIGIN=http://localhost:4321" >> workers/api/.dev.vars
      - run: pnpm verify:all
      - name: Apply remote D1 migrations
        working-directory: workers/api
        run: npx wrangler d1 migrations apply alumni-book-db --remote --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      - name: Prepare unified Pages deployment
        env:
          RELEASE_SHA: ${{ github.sha }}
        run: pnpm prepare:pages
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          pnpm --filter worker exec wrangler --cwd ../.. pages deploy deploy
          --project-name alumni-book --branch main
          --commit-hash "$GITHUB_SHA" --commit-dirty=false
      - name: Smoke test exact production release
        env:
          PAGES_BASE_URL: https://alumni-book.pages.dev
          PAGES_EXPECTED_SHA: ${{ github.sha }}
        run: pnpm smoke:pages
