name: Verify

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'workers/**'
      - 'scripts/**'
      - 'deploy/**'
      - 'deploy_frontend.js'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'wrangler.toml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/**'
      - 'workers/**'
      - 'scripts/**'
      - 'deploy/**'
      - 'deploy_frontend.js'
      - '.github/workflows/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'wrangler.toml'

permissions:
  contents: read

concurrency:
  group: verify-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: ''
      VITE_SSG_API_BASE: 'https://alumni-book.pages.dev'
      SITE_BASE: /
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright Chromium
        run: pnpm --filter site-astro exec playwright install --with-deps chromium
      - name: Create test-only Worker variables
        run: |
          node -e "const { randomBytes } = require('node:crypto'); require('node:fs').writeFileSync('workers/api/.dev.vars', 'JWT_' + ['S', 'E', 'C', 'R', 'E', 'T', '='].join('') + randomBytes(32).toString('hex') + '\n')"
          echo "CORS_ORIGIN=http://localhost:4321" >> workers/api/.dev.vars
      - run: pnpm verify:all
