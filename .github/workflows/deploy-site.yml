name: Deploy Site & Admin

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/site-astro/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
  schedule:
    - cron: '3 3 * * *'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      VITE_API_BASE_URL: 'https://alumni-book-api.chenyuhao2263.workers.dev'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build site (Astro SSG)
        run: pnpm --filter site-astro build

      - name: Build admin
        run: pnpm --filter admin build

      - name: Prepare deployment
        run: |
          mkdir -p deploy
          cp -r packages/site-astro/dist/* deploy/
          mkdir -p deploy/admin
          cp -r packages/admin/dist/* deploy/admin/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy deploy --project-name alumni-book --branch main
