name: Deploy Site & Admin

on:
  push:
    branches: [main, master]
    paths:
      - 'packages/site-astro/**'
      - 'packages/admin/**'
      - 'packages/shared/**'
      - 'workers/api/**'
      - 'wrangler.toml'
      - 'scripts/prepare-pages-deploy.mjs'
      - 'scripts/smoke-pages.mjs'
      - 'package.json'
      - 'pnpm-lock.yaml'
  schedule:
    - cron: '3 3 * * *'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      # 客户端 API 设为空，走 Pages Function 同域代理
      VITE_API_BASE_URL: ''
      # SSG 构建时读取 Pages 正式入口
      VITE_WORKER_URL: 'https://alumni-book.pages.dev'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create .dev.vars for testing
        run: |
          echo "JWT_SECRET=alumni-book-jwt-secret-dev-only-2026" > workers/api/.dev.vars
          echo "CORS_ORIGIN=http://localhost:4321" >> workers/api/.dev.vars

      - name: Verify Worker tests
        run: pnpm verify:worker

      - name: Verify Admin build
        run: pnpm verify:admin
        env:
          SITE_BASE: /

      - name: Verify Site build and navigation
        run: pnpm verify:site
        env:
          SITE_BASE: /
          VITE_WORKER_URL: 'https://alumni-book.pages.dev'
          VITE_API_BASE_URL: ''

      - name: Prepare unified Pages deployment
        run: pnpm prepare:pages

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm --filter worker exec wrangler --cwd ../.. pages deploy deploy --project-name alumni-book --branch main --commit-dirty=true

      - name: Smoke test production Pages deployment
        env:
          PAGES_BASE_URL: https://alumni-book.pages.dev
        run: pnpm smoke:pages
