name: Deploy Worker

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create .dev.vars for testing
        run: |
          echo "JWT_SECRET=alumni-book-jwt-secret-dev-only-2026" > workers/api/.dev.vars
          echo "CORS_ORIGIN=http://localhost:4321" >> workers/api/.dev.vars

      - name: Verify Worker tests
        run: pnpm verify:worker

      - name: Apply remote D1 migrations
        working-directory: workers/api
        run: npx wrangler d1 migrations apply alumni-book-db --remote --config wrangler.toml
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 963a89670f2e39791ef758e54f361561

      - name: Deploy Worker
        working-directory: workers/api
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
