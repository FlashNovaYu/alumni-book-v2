<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>同学录 · 页面跳转中</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #faf9f5;
      color: #141413;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 40px 24px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 24px;
      color: #cc785c;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 12px;
    }
    p {
      color: #6c6a64;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 44px;
      padding: 0 24px;
      background: #cc785c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s ease;
    }
    .btn:hover { background: #a9583e; }
    .btn-secondary {
      background: #efe9de;
      color: #141413;
      margin-left: 8px;
    }
    .btn-secondary:hover { background: #e8e0d2; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <circle cx="12" cy="12" r="10"/>
      <path d="M16 16s-1.5-2-4-2-4 2-4 2"/>
      <line x1="9" y1="9" x2="9.01" y2="9"/>
      <line x1="15" y1="9" x2="15.01" y2="9"/>
    </svg>
    <h1 id="title">页面未找到</h1>
    <p id="message">你访问的页面不存在，可能已被移动或删除。</p>
    <div>
      <a href="/alumni-book-v2/" class="btn">回到首页</a>
      <a href="/alumni-book-v2/admin/" class="btn btn-secondary">管理后台</a>
    </div>
  </div>

  <script>
    // 处理旧版 history 路由的 admin URL 重定向到 hash 路由
    // 例如: /admin/students → /admin/#/students
    (function() {
      var siteBase = '/alumni-book-v2/';
      var path = window.location.pathname;
      var adminMatch = path.match(/\/admin\/(.*)/);
      if (adminMatch && adminMatch[1]) {
        var adminPath = adminMatch[1].replace(/\/$/, '');
        if (adminPath && adminPath !== 'index.html') {
          window.location.replace(siteBase + 'admin/#/' + adminPath + window.location.search);
          return;
        }
      }

      // 检测网络连接状态
      if (!navigator.onLine) {
        document.getElementById('title').textContent = '网络连接中断';
        document.getElementById('message').textContent = '请检查你的网络连接后重试。GitHub Pages 在国内可能访问较慢，建议使用 VPN 或稍后再试。';
      }
    })();
  </script>
</body>
</html>
