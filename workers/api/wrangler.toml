name = "alumni-book-api"
main = "src/index.ts"
compatibility_date = "2024-10-22"
workers_dev = true

[vars]
# 正式站点唯一允许的跨域来源；缺失时 Worker 也会回退到此地址，绝不使用通配符。
CORS_ORIGIN = "https://alumni-book.pages.dev"
# 仅填写已审批预览环境的完整 HTTPS Origin，多个地址用逗号分隔；默认不开放预览跨域访问。
CORS_PREVIEW_ORIGINS = ""

[[d1_databases]]
binding = "DB"
database_name = "alumni-book-db"
database_id = "7068f542-0b92-482f-9fa4-37971ceffa63"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "alumni-book-assets"
